<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Monitor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #111111;
            --border: #222222;
            --text: #ffffff;
            --text-secondary: #888888;
            --accent: #ffffff;
            --success: #00ff88;
            --warning: #ffaa00;
            --danger: #ff4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
            background: var(--bg);
            color: var(--text);
            line-height: 1.4;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 极简头部 */
        header {
            border-bottom: 1px solid var(--border);
            padding: 20px 0;
            margin-bottom: 30px;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .timestamp {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        /* 状态指示器 */
        .status-indicators {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1px;
            background: var(--border);
            margin-bottom: 30px;
            border: 1px solid var(--border);
        }

        .status-item {
            background: var(--surface);
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: background 0.2s;
        }

        .status-item:hover {
            background: #1a1a1a;
        }

        .status-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .status-info {
            flex: 1;
        }

        .status-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .status-value {
            font-size: 1.4rem;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        /* 进度条 */
        .progress-container {
            margin-top: 8px;
        }

        .progress-bar {
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            transition: width 0.3s;
        }

        /* 图表区域 */
        .charts-section {
            margin-bottom: 30px;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1px;
            background: var(--border);
            border: 1px solid var(--border);
        }

        .chart-item {
            background: var(--surface);
            padding: 20px;
        }

        .chart-title {
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
        }

        .chart-container {
            height: 120px;
        }

        /* 系统信息 */
        .system-info {
            background: var(--surface);
            border: 1px solid var(--border);
            margin-bottom: 30px;
        }

        .info-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1px;
            background: var(--border);
        }

        .info-item {
            background: var(--surface);
            padding: 15px 20px;
        }

        .info-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 1rem;
            font-variant-numeric: tabular-nums;
        }

        /* 进程列表 */
        .processes-section {
            background: var(--surface);
            border: 1px solid var(--border);
        }

        .processes-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .processes-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
        }

        .processes-table {
            width: 100%;
            border-collapse: collapse;
        }

        .processes-table th,
        .processes-table td {
            padding: 12px 20px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }

        .processes-table th {
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.8rem;
        }

        .processes-table tr:last-child td {
            border-bottom: none;
        }

        /* 控制按钮 */
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn:hover {
            background: #1a1a1a;
            border-color: #333333;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .status-indicators {
                grid-template-columns: 1fr;
            }
            
            .charts-grid {
                grid-template-columns: 1fr;
            }
            
            .info-grid {
                grid-template-columns: 1fr;
            }
        }

        /* 特殊状态 */
        .status-high {
            color: var(--warning);
        }

        .status-critical {
            color: var(--danger);
        }

        .status-good {
            color: var(--success);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div class="logo">SYSTEM MONITOR</div>
                <div class="timestamp" id="currentTime"></div>
            </div>
        </header>

        <!-- 控制按钮 -->
        <div class="controls">
            <button class="btn" onclick="refreshData()">
                <i class="fas fa-sync-alt"></i>
                REFRESH
            </button>
            <button class="btn" onclick="toggleAutoRefresh()">
                <i class="fas fa-play"></i>
                AUTO
            </button>
        </div>

        <!-- 状态指示器 -->
        <div class="status-indicators">
            <div class="status-item">
                <div class="status-icon">
                    <i class="fas fa-microchip"></i>
                </div>
                <div class="status-info">
                    <div class="status-label">CPU</div>
                    <div class="status-value" id="cpuUsage">0%</div>
                    <div class="progress-container">
                        <div class="progress-bar">
                            <div class="progress-fill" id="cpuProgress" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="status-item">
                <div class="status-icon">
                    <i class="fas fa-memory"></i>
                </div>
                <div class="status-info">
                    <div class="status-label">MEMORY</div>
                    <div class="status-value" id="memoryUsage">0%</div>
                    <div class="progress-container">
                        <div class="progress-bar">
                            <div class="progress-fill" id="memoryProgress" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="status-item">
                <div class="status-icon">
                    <i class="fas fa-hdd"></i>
                </div>
                <div class="status-info">
                    <div class="status-label">DISK</div>
                    <div class="status-value" id="diskUsage">0%</div>
                    <div class="progress-container">
                        <div class="progress-bar">
                            <div class="progress-fill" id="diskProgress" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="status-item">
                <div class="status-icon">
                    <i class="fas fa-network-wired"></i>
                </div>
                <div class="status-info">
                    <div class="status-label">NETWORK</div>
                    <div class="status-value" id="networkUsage">0 KB/s</div>
                    <div class="progress-container">
                        <div class="progress-bar">
                            <div class="progress-fill" id="networkProgress" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 图表区域 -->
        <div class="charts-section">
            <div class="charts-grid">
                <div class="chart-item">
                    <div class="chart-title">CPU USAGE</div>
                    <div class="chart-container">
                        <canvas id="cpuChart"></canvas>
                    </div>
                </div>
                <div class="chart-item">
                    <div class="chart-title">MEMORY USAGE</div>
                    <div class="chart-container">
                        <canvas id="memoryChart"></canvas>
                    </div>
                </div>
                <div class="chart-item">
                    <div class="chart-title">NETWORK I/O</div>
                    <div class="chart-container">
                        <canvas id="networkChart"></canvas>
                    </div>
                </div>
                <div class="chart-item">
                    <div class="chart-title">DISK USAGE</div>
                    <div class="chart-container">
                        <canvas id="diskChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- 系统信息 -->
        <div class="system-info">
            <div class="info-header">SYSTEM INFORMATION</div>
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">HOSTNAME</div>
                    <div class="info-value" id="hostname">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">OS</div>
                    <div class="info-value" id="os">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">UPTIME</div>
                    <div class="info-value" id="uptime">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">CPU MODEL</div>
                    <div class="info-value" id="cpuModel">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">TOTAL MEMORY</div>
                    <div class="info-value" id="totalMemory">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">TOTAL DISK</div>
                    <div class="info-value" id="totalDisk">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">IP ADDRESS</div>
                    <div class="info-value" id="ipAddress">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">LAST UPDATE</div>
                    <div class="info-value" id="lastUpdate">-</div>
                </div>
            </div>
        </div>

        <!-- 进程列表 -->
        <div class="processes-section">
            <div class="processes-header">
                <div class="processes-title">RUNNING PROCESSES</div>
                <button class="btn" onclick="refreshProcesses()">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
            <table class="processes-table">
                <thead>
                    <tr>
                        <th>PROCESS</th>
                        <th>PID</th>
                        <th>CPU</th>
                        <th>MEM</th>
                        <th>STATUS</th>
                    </tr>
                </thead>
                <tbody id="processesList">
                    <tr>
                        <td colspan="5" style="text-align: center; color: var(--text-secondary);">
                            LOADING...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // 图表实例
        let cpuChart, memoryChart, networkChart, diskChart;
        let autoRefreshInterval = null;

        // 更新时间显示
        function updateTime() {
            const now = new Date();
            document.getElementById('currentTime').textContent = 
                now.toISOString().replace('T', ' ').substring(0, 19) + ' UTC';
        }
        
        // 初始化图表
        function initializeCharts() {
            const ctx1 = document.getElementById('cpuChart').getContext('2d');
            const ctx2 = document.getElementById('memoryChart').getContext('2d');
            const ctx3 = document.getElementById('networkChart').getContext('2d');
            const ctx4 = document.getElementById('diskChart').getContext('2d');

            const chartOptions = {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { 
                        display: false,
                        grid: { display: false }
                    },
                    y: { 
                        display: false,
                        grid: { display: false },
                        beginAtZero: true,
                        max: 100
                    }
                },
                elements: {
                    line: { tension: 0.4 },
                    point: { radius: 0 }
                }
            };

            cpuChart = new Chart(ctx1, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        data: [],
                        borderColor: '#ffffff',
                        borderWidth: 2,
                        fill: false
                    }]
                },
                options: chartOptions
            });

            memoryChart = new Chart(ctx2, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        data: [],
                        borderColor: '#ffffff',
                        borderWidth: 2,
                        fill: false
                    }]
                },
                options: chartOptions
            });

            networkChart = new Chart(ctx3, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'IN',
                        data: [],
                        borderColor: '#00ff88',
                        borderWidth: 1,
                        fill: false
                    }, {
                        label: 'OUT',
                        data: [],
                        borderColor: '#ff4444',
                        borderWidth: 1,
                        fill: false
                    }]
                },
                options: {
                    ...chartOptions,
                    plugins: { legend: { display: true } },
                    scales: { ...chartOptions.scales, y: { ...chartOptions.scales.y, max: null } }
                }
            });

            diskChart = new Chart(ctx4, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        data: [],
                        borderColor: '#ffffff',
                        borderWidth: 2,
                        fill: false
                    }]
                },
                options: chartOptions
            });
        }

        // 模拟服务器数据
        function generateMockData() {
            return {
                cpu: {
                    usage: Math.min(100, Math.max(0, 15 + Math.random() * 50)),
                    load: (Math.random() * 3).toFixed(2),
                    cores: 8
                },
                memory: {
                    usage: Math.min(100, Math.max(0, 25 + Math.random() * 40)),
                    used: (4 + Math.random() * 3).toFixed(1),
                    available: (8 - (4 + Math.random() * 3)).toFixed(1),
                    total: 8
                },
                disk: {
                    usage: Math.min(100, Math.max(0, 35 + Math.random() * 30)),
                    used: (80 + Math.random() * 60).toFixed(1),
                    available: (200 - (80 + Math.random() * 60)).toFixed(1),
                    total: 200
                },
                network: {
                    usage: Math.random() * 60,
                    up: (Math.random() * 8).toFixed(1),
                    down: (Math.random() * 30).toFixed(1)
                },
                server: {
                    hostname: 'server-' + Math.floor(Math.random() * 100),
                    os: 'Ubuntu 22.04',
                    uptime: Math.floor(Math.random() * 86400) + 's',
                    cpuModel: 'Intel Xeon E5',
                    totalMemory: '8 GB',
                    totalDisk: '200 GB',
                    ipAddress: '192.168.1.' + Math.floor(Math.random() * 255)
                },
                processes: Array.from({length: 5}, (_, i) => ({
                    name: ['nginx', 'mysql', 'redis', 'ssh', 'systemd'][i],
                    pid: 1000 + i,
                    cpu: (Math.random() * 4).toFixed(1),
                    memory: (Math.random() * 0.8).toFixed(1),
                    status: Math.random() > 0.1 ? 'RUNNING' : 'STOPPED'
                }))
            };
        }

        // 更新图表数据
        function updateCharts(data) {
            const now = new Date().toLocaleTimeString();
            
            if (cpuChart.data.labels.length > 10) {
                cpuChart.data.labels.shift();
                cpuChart.data.datasets[0].data.shift();
                
                memoryChart.data.labels.shift();
                memoryChart.data.datasets[0].data.shift();
                
                networkChart.data.labels.shift();
                networkChart.data.datasets[0].data.shift();
                networkChart.data.datasets[1].data.shift();
                
                diskChart.data.labels.shift();
                diskChart.data.datasets[0].data.shift();
            }

            cpuChart.data.labels.push(now);
            cpuChart.data.datasets[0].data.push(data.cpu.usage);
            cpuChart.update('none');

            memoryChart.data.labels.push(now);
            memoryChart.data.datasets[0].data.push(data.memory.usage);
            memoryChart.update('none');

            networkChart.data.labels.push(now);
            networkChart.data.datasets[0].data.push(parseFloat(data.network.up));
            networkChart.data.datasets[1].data.push(parseFloat(data.network.down));
            networkChart.update('none');

            diskChart.data.labels.push(now);
            diskChart.data.datasets[0].data.push(data.disk.usage);
            diskChart.update('none');
        }

        // 更新状态卡片
        function updateStatusCards(data) {
            document.getElementById('cpuUsage').textContent = data.cpu.usage.toFixed(1) + '%';
            document.getElementById('cpuProgress').style.width = data.cpu.usage + '%';

            document.getElementById('memoryUsage').textContent = data.memory.usage.toFixed(1) + '%';
            document.getElementById('memoryProgress').style.width = data.memory.usage + '%';

            document.getElementById('diskUsage').textContent = data.disk.usage.toFixed(1) + '%';
            document.getElementById('diskProgress').style.width = data.disk.usage + '%';

            const networkUsage = Math.max(data.network.up, data.network.down);
            document.getElementById('networkUsage').textContent = networkUsage.toFixed(1) + ' KB/s';
            document.getElementById('networkProgress').style.width = Math.min(100, networkUsage) + '%';

            document.getElementById('hostname').textContent = data.server.hostname;
            document.getElementById('os').textContent = data.server.os;
            document.getElementById('uptime').textContent = data.server.uptime;
            document.getElementById('cpuModel').textContent = data.server.cpuModel;
            document.getElementById('totalMemory').textContent = data.server.totalMemory;
            document.getElementById('totalDisk').textContent = data.server.totalDisk;
            document.getElementById('ipAddress').textContent = data.server.ipAddress;
            document.getElementById('lastUpdate').textContent = new Date().toLocaleString();

            const processesList = document.getElementById('processesList');
            processesList.innerHTML = '';
            
            data.processes.forEach(process => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${process.name}</td>
                    <td>${process.pid}</td>
                    <td>${process.cpu}%</td>
                    <td>${process.memory}%</td>
                    <td>${process.status}</td>
                `;
                processesList.appendChild(row);
            });
        }

        // 刷新数据
        function refreshData() {
            const data = generateMockData();
            updateStatusCards(data);
            updateCharts(data);
            updateTime();
        }

        // 切换自动刷新
        function toggleAutoRefresh() {
            const button = event.target.closest('button');
            
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
                button.innerHTML = '<i class="fas fa-play"></i> AUTO';
            } else {
                autoRefreshInterval = setInterval(refreshData, 3000);
                button.innerHTML = '<i class="fas fa-stop"></i> STOP';
            }
        }

        // 刷新进程列表
        function refreshProcesses() {
            refreshData();
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            initializeCharts();
            refreshData();
            setInterval(updateTime, 1000);
            
            // 初始自动刷新
            autoRefreshInterval = setInterval(refreshData, 3000);
        });
    </script>
</body>
</html>
