<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务器监控面板</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }

        /* 头部 */
        header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }

        header h1 {
            font-size: 2.8rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.2rem;
            opacity: 0.9;
            font-weight: 300;
        }

        /* 控制按钮 */
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        /* 主网格 */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        /* 卡片样式 */
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.15);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .card-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.3rem;
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #2d3748;
        }

        /* 状态值 */
        .status-value {
            font-size: 2.2rem;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 10px;
        }

        .status-label {
            font-size: 0.9rem;
            color: #718096;
            margin-bottom: 15px;
        }

        /* 进度条 */
        .progress-bar {
            height: 8px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
            margin: 15px 0;
        }

        .progress-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s ease;
            background: linear-gradient(90deg, #667eea, #764ba2);
        }

        /* 图表区域 */
        .charts-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .chart-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .chart-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #2d3748;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chart-container {
            height: 200px;
            position: relative;
        }

        /* 系统信息 */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .info-label {
            font-size: 0.85rem;
            color: #718096;
            font-weight: 500;
        }

        .info-value {
            font-size: 1rem;
            color: #2d3748;
            font-weight: 600;
        }

        /* 进程列表 */
        .processes-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: #2d3748;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .processes-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .processes-table th,
        .processes-table td {
            padding: 15px 20px;
            text-align: left;
            border-bottom: 1px solid #f7fafc;
        }

        .processes-table th {
            background: #f8fafc;
            font-weight: 600;
            color: #4a5568;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .processes-table tr:hover {
            background: #f7fafc;
        }

        /* 状态指示器 */
        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .status-running {
            background: #c6f6d5;
            color: #22543d;
        }

        .status-stopped {
            background: #fed7d7;
            color: #742a2a;
        }

        .indicator-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .dot-running {
            background: #38a169;
        }

        .dot-stopped {
            background: #e53e3e;
        }

        /* 动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fadeInUp 0.6s ease;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
            
            .charts-section {
                grid-template-columns: 1fr;
            }
            
            .container {
                padding: 20px;
            }
            
            header h1 {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>服务器监控面板</h1>
            <p>实时监控系统性能与运行状态</p>
        </header>

        <!-- 控制按钮 -->
        <div class="controls">
            <button class="btn" onclick="refreshData()">
                <i class="fas fa-sync-alt"></i>
                刷新数据
            </button>
            <button class="btn" onclick="toggleAutoRefresh()">
                <i class="fas fa-play"></i>
                自动刷新
            </button>
            <button class="btn" onclick="exportData()">
                <i class="fas fa-download"></i>
                导出报告
            </button>
        </div>

        <!-- 主要状态网格 -->
        <div class="dashboard-grid">
            <div class="card animate-fade-in">
                <div class="card-header">
                    <div class="card-icon">
                        <i class="fas fa-microchip"></i>
                    </div>
                    <div class="card-title">CPU 使用率</div>
                </div>
                <div class="status-value" id="cpuUsage">0%</div>
                <div class="status-label">负载: <span id="cpuLoad">0.00</span> | 核心: <span id="cpuCores">0</span></div>
                <div class="progress-bar">
                    <div class="progress-fill" id="cpuProgress" style="width: 0%"></div>
                </div>
            </div>

            <div class="card animate-fade-in">
                <div class="card-header">
                    <div class="card-icon">
                        <i class="fas fa-memory"></i>
                    </div>
                    <div class="card-title">内存使用率</div>
                </div>
                <div class="status-value" id="memoryUsage">0%</div>
                <div class="status-label">已用: <span id="memoryUsed">0 GB</span> | 可用: <span id="memoryAvailable">0 GB</span></div>
                <div class="progress-bar">
                    <div class="progress-fill" id="memoryProgress" style="width: 0%"></div>
                </div>
            </div>

            <div class="card animate-fade-in">
                <div class="card-header">
                    <div class="card-icon">
                        <i class="fas fa-hdd"></i>
                    </div>
                    <div class="card-title">磁盘使用率</div>
                </div>
                <div class="status-value" id="diskUsage">0%</div>
                <div class="status-label">已用: <span id="diskUsed">0 GB</span> | 可用: <span id="diskAvailable">0 GB</span></div>
                <div class="progress-bar">
                    <div class="progress-fill" id="diskProgress" style="width: 0%"></div>
                </div>
            </div>

            <div class="card animate-fade-in">
                <div class="card-header">
                    <div class="card-icon">
                        <i class="fas fa-network-wired"></i>
                    </div>
                    <div class="card-title">网络流量</div>
                </div>
                <div class="status-value" id="networkUsage">0 KB/s</div>
                <div class="status-label">上行: <span id="networkUp">0 KB/s</span> | 下行: <span id="networkDown">0 KB/s</span></div>
                <div class="progress-bar">
                    <div class="progress-fill" id="networkProgress" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <!-- 图表区域 -->
        <div class="charts-section">
            <div class="chart-card">
                <div class="chart-title">
                    <i class="fas fa-chart-line"></i>
                    CPU 使用趋势
                </div>
                <div class="chart-container">
                    <canvas id="cpuChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <div class="chart-title">
                    <i class="fas fa-chart-area"></i>
                    内存使用趋势
                </div>
                <div class="chart-container">
                    <canvas id="memoryChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <div class="chart-title">
                    <i class="fas fa-exchange-alt"></i>
                    网络流量趋势
                </div>
                <div class="chart-container">
                    <canvas id="networkChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <div class="chart-title">
                    <i class="fas fa-hdd"></i>
                    磁盘使用趋势
                </div>
                <div class="chart-container">
                    <canvas id="diskChart"></canvas>
                </div>
            </div>
        </div>

        <!-- 系统信息 -->
        <div class="card">
            <div class="card-header">
                <div class="card-icon">
                    <i class="fas fa-server"></i>
                </div>
                <div class="card-title">系统信息</div>
            </div>
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">主机名</div>
                    <div class="info-value" id="hostname">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">操作系统</div>
                    <div class="info-value" id="os">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">运行时间</div>
                    <div class="info-value" id="uptime">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">CPU 型号</div>
                    <div class="info-value" id="cpuModel">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">总内存</div>
                    <div class="info-value" id="totalMemory">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">总磁盘</div>
                    <div class="info-value" id="totalDisk">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">IP 地址</div>
                    <div class="info-value" id="ipAddress">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">最后更新</div>
                    <div class="info-value" id="lastUpdate">-</div>
                </div>
            </div>
        </div>

        <!-- 进程列表 -->
        <div class="processes-section">
            <div class="section-header">
                <div class="section-title">
                    <i class="fas fa-list"></i>
                    运行进程
                </div>
                <button class="btn" onclick="refreshProcesses()">
                    <i class="fas fa-sync-alt"></i>
                    刷新
                </button>
            </div>
            <table class="processes-table">
                <thead>
                    <tr>
                        <th>进程名</th>
                        <th>PID</th>
                        <th>CPU</th>
                        <th>内存</th>
                        <th>状态</th>
                    </tr>
                </thead>
                <tbody id="processesList">
                    <tr>
                        <td colspan="5" style="text-align: center; color: #718096;">
                            <i class="fas fa-spinner fa-spin"></i> 加载中...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // 图表实例
        let cpuChart, memoryChart, networkChart, diskChart;
        let autoRefreshInterval = null;
        
        // 初始化图表
        function initializeCharts() {
            const ctx1 = document.getElementById('cpuChart').getContext('2d');
            const ctx2 = document.getElementById('memoryChart').getContext('2d');
            const ctx3 = document.getElementById('networkChart').getContext('2d');
            const ctx4 = document.getElementById('diskChart').getContext('2d');

            const chartOptions = {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        labels: {
                            color: '#4a5568',
                            font: { size: 11 }
                        }
                    }
                },
                scales: {
                    x: {
                        grid: { color: '#f7fafc' },
                        ticks: { color: '#718096', font: { size: 10 } }
                    },
                    y: {
                        grid: { color: '#f7fafc' },
                        ticks: { color: '#718096', font: { size: 10 } }
                    }
                }
            };

            cpuChart = new Chart(ctx1, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'CPU',
                        data: [],
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    ...chartOptions,
                    scales: {
                        ...chartOptions.scales,
                        y: {
                            ...chartOptions.scales.y,
                            beginAtZero: true,
                            max: 100
                        }
                    }
                }
            });

            memoryChart = new Chart(ctx2, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: '内存',
                        data: [],
                        borderColor: '#764ba2',
                        backgroundColor: 'rgba(118, 75, 162, 0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    ...chartOptions,
                    scales: {
                        ...chartOptions.scales,
                        y: {
                            ...chartOptions.scales.y,
                            beginAtZero: true,
                            max: 100
                        }
                    }
                }
            });

            networkChart = new Chart(ctx3, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: '上行',
                        data: [],
                        borderColor: '#48bb78',
                        borderWidth: 2,
                        fill: false,
                        tension: 0.4
                    }, {
                        label: '下行',
                        data: [],
                        borderColor: '#ed8936',
                        borderWidth: 2,
                        fill: false,
                        tension: 0.4
                    }]
                },
                options: chartOptions
            });

            diskChart = new Chart(ctx4, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: '磁盘',
                        data: [],
                        borderColor: '#e53e3e',
                        backgroundColor: 'rgba(229, 62, 62, 0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    ...chartOptions,
                    scales: {
                        ...chartOptions.scales,
                        y: {
                            ...chartOptions.scales.y,
                            beginAtZero: true,
                            max: 100
                        }
                    }
                }
            });
        }

        // 模拟服务器数据
        function generateMockData() {
            return {
                cpu: {
                    usage: Math.min(100, Math.max(0, 20 + Math.random() * 40)),
                    load: (Math.random() * 3).toFixed(2),
                    cores: 8
                },
                memory: {
                    usage: Math.min(100, Math.max(0, 30 + Math.random() * 35)),
                    used: (4 + Math.random() * 3).toFixed(1),
                    available: (8 - (4 + Math.random() * 3)).toFixed(1),
                    total: 8
                },
                disk: {
                    usage: Math.min(100, Math.max(0, 40 + Math.random() * 25)),
                    used: (80 + Math.random() * 60).toFixed(1),
                    available: (200 - (80 + Math.random() * 60)).toFixed(1),
                    total: 200
                },
                network: {
                    usage: Math.random() * 80,
                    up: (Math.random() * 10).toFixed(1),
                    down: (Math.random() * 40).toFixed(1)
                },
                server: {
                    hostname: 'server-' + Math.floor(Math.random() * 100),
                    os: 'Ubuntu 22.04',
                    uptime: Math.floor(Math.random() * 86400) + '秒',
                    cpuModel: 'Intel Xeon E5',
                    totalMemory: '8 GB',
                    totalDisk: '200 GB',
                    ipAddress: '192.168.1.' + Math.floor(Math.random() * 255)
                },
                processes: Array.from({length: 6}, (_, i) => ({
                    name: ['nginx', 'mysql', 'php', 'redis', 'ssh', 'systemd'][i],
                    pid: 1000 + i,
                    cpu: (Math.random() * 5).toFixed(1),
                    memory: (Math.random() * 1).toFixed(1),
                    status: Math.random() > 0.1 ? 'running' : 'stopped'
                }))
            };
        }

        // 更新图表数据
        function updateCharts(data) {
            const now = new Date().toLocaleTimeString();
            
            if (cpuChart.data.labels.length > 12) {
                cpuChart.data.labels.shift();
                cpuChart.data.datasets[0].data.shift();
                
                memoryChart.data.labels.shift();
                memoryChart.data.datasets[0].data.shift();
                
                networkChart.data.labels.shift();
                networkChart.data.datasets[0].data.shift();
                networkChart.data.datasets[1].data.shift();
                
                diskChart.data.labels.shift();
                diskChart.data.datasets[0].data.shift();
            }

            cpuChart.data.labels.push(now);
            cpuChart.data.datasets[0].data.push(data.cpu.usage);
            cpuChart.update('none');

            memoryChart.data.labels.push(now);
            memoryChart.data.datasets[0].data.push(data.memory.usage);
            memoryChart.update('none');

            networkChart.data.labels.push(now);
            networkChart.data.datasets[0].data.push(parseFloat(data.network.up));
            networkChart.data.datasets[1].data.push(parseFloat(data.network.down));
            networkChart.update('none');

            diskChart.data.labels.push(now);
            diskChart.data.datasets[0].data.push(data.disk.usage);
            diskChart.update('none');
        }

        // 更新状态卡片
        function updateStatusCards(data) {
            document.getElementById('cpuUsage').textContent = data.cpu.usage.toFixed(1) + '%';
            document.getElementById('cpuProgress').style.width = data.cpu.usage + '%';
            document.getElementById('cpuLoad').textContent = data.cpu.load;
            document.getElementById('cpuCores').textContent = data.cpu.cores;

            document.getElementById('memoryUsage').textContent = data.memory.usage.toFixed(1) + '%';
            document.getElementById('memoryProgress').style.width = data.memory.usage + '%';
            document.getElementById('memoryUsed').textContent = data.memory.used + ' GB';
            document.getElementById('memoryAvailable').textContent = data.memory.available + ' GB';

            document.getElementById('diskUsage').textContent = data.disk.usage.toFixed(1) + '%';
            document.getElementById('diskProgress').style.width = data.disk.usage + '%';
            document.getElementById('diskUsed').textContent = data.disk.used + ' GB';
            document.getElementById('diskAvailable').textContent = data.disk.available + ' GB';

            const networkUsage = Math.max(data.network.up, data.network.down);
            document.getElementById('networkUsage').textContent = networkUsage.toFixed(1) + ' KB/s';
            document.getElementById('networkProgress').style.width = Math.min(100, networkUsage) + '%';
            document.getElementById('networkUp').textContent = data.network.up + ' KB/s';
            document.getElementById('networkDown').textContent = data.network.down + ' KB/s';

            document.getElementById('hostname').textContent = data.server.hostname;
            document.getElementById('os').textContent = data.server.os;
            document.getElementById('uptime').textContent = data.server.uptime;
            document.getElementById('cpuModel').textContent = data.server.cpuModel;
            document.getElementById('totalMemory').textContent = data.server.totalMemory;
            document.getElementById('totalDisk').textContent = data.server.totalDisk;
            document.getElementById('ipAddress').textContent = data.server.ipAddress;
            document.getElementById('lastUpdate').textContent = new Date().toLocaleString();

            const processesList = document.getElementById('processesList');
            processesList.innerHTML = '';
            
            data.processes.forEach(process => {
                const row = document.createElement('tr');
                const statusClass = process.status === 'running' ? 'status-running' : 'status-stopped';
                const dotClass = process.status === 'running' ? 'dot-running' : 'dot-stopped';
                const statusText = process.status === 'running' ? '运行中' : '已停止';
                
                row.innerHTML = `
                    <td>${process.name}</td>
                    <td>${process.pid}</td>
                    <td>${process.cpu}%</td>
                    <td>${process.memory}%</td>
                    <td>
                        <div class="status-indicator ${statusClass}">
                            <div class="indicator-dot ${dotClass}"></div>
                            ${statusText}
                        </div>
                    </td>
                `;
                processesList.appendChild(row);
            });
        }

        // 刷新数据
        function refreshData() {
            const data = generateMockData();
            updateStatusCards(data);
            updateCharts(data);
        }

        // 切换自动刷新
        function toggleAutoRefresh() {
            const button = event.target.closest('button');
            
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
                button.innerHTML = '<i class="fas fa-play"></i> 自动刷新';
            } else {
                autoRefreshInterval = setInterval(refreshData, 5000);
                button.innerHTML = '<i class="fas fa-stop"></i> 停止刷新';
            }
        }

        // 导出数据
        function exportData() {
            const data = {
                timestamp: new Date().toISOString(),
                serverInfo: {
                    hostname: document.getElementById('hostname').textContent,
                    os: document.getElementById('os').textContent,
                    uptime: document.getElementById('uptime').textContent
                },
                metrics: {
                    cpu: document.getElementById('cpuUsage').textContent,
                    memory: document.getElementById('memoryUsage').textContent,
                    disk: document.getElementById('diskUsage').textContent,
                    network: document.getElementById('networkUsage').textContent
                }
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `server-monitor-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // 刷新进程列表
        function refreshProcesses() {
            refreshData();
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            initializeCharts();
            refreshData();
        });
    </script>
</body>
</html>
